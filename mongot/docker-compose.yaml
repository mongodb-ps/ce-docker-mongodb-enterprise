services:
  mongot_mongo:
    image: "${NAMESPACE}/mongodb:${OM_VERSION}"
    hostname: "mongo_${PROJECT_IDX}_${IDX}"
    volumes:
      - ${MONGO_DBPATH}/mongo_${PROJECT_IDX}_${IDX}:/data/db
      - ${MONGO_LOGPATH}/mongo_${PROJECT_IDX}_${IDX}:/data/log
    ports:
      - "27017"
    environment:
      OM_URL: "http://${HOSTNAME}:${OM_MAPPING_PORT}"
      PROJECT_ID: "${PROJECT_ID}"
      AGENT_API_KEY: "${AGENT_API_KEY}"
    restart: always
    extra_hosts:
      - "${HOSTNAME}:host-gateway"
    networks:
      - docker_mongodb
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
  mongot:
    image: "${NAMESPACE}/mongot:${MONGOT_VERSION}"
    hostname: "mongot"
    volumes:
      - ${MONGOT_DATAPATH}:/data/mongot
    ports:
      - "27028"
      - "8080"
    environment:
      MONGOT_PWD: "${MONGOT_PWD}"
      MONGOD_HOSTS: "${MONGOD_HOSTS}"
    restart: always
    networks:
      - docker_mongodb
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
networks:
  docker_mongodb:
    external: true
    name: docker_mongodb