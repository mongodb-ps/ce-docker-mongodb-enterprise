services:
  appdb:
    image: "mongodb/mongodb-enterprise-server:${APPDB_VERSION}"
    hostname: "appdb"
    restart: always
    ports:
      - "${APPDB_MAPPING_PORT}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${ROOT_USER}"
      MONGO_INITDB_ROOT_PASSWORD: "${ROOT_PWD}"
    volumes:
      - ${APPDB_DBPATH}:/data/db
    networks:
      - opsmanager
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
  opsmanager:
    image: "${NAMESPACE}/ops-manager:${OM_VERSION}"
    hostname: "ops-manager"
    restart: always
    depends_on:
      appdb:
        condition: service_healthy
    ports:
      - "${OM_MAPPING_PORT}:8080"
    environment:
      ROOT_USER: "${ROOT_USER}"
      ROOT_PWD: "${ROOT_PWD}"
    volumes:
      - ${RELEASES}:/mongodb-mms/mongodb-releases
      - ${OM_LOGS}:/mongodb-mms/logs
    networks:
      - opsmanager
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 10G
  backup-daemon:
    image: "${NAMESPACE}/backup-daemon:${OM_VERSION}"
    hostname: "backup-daemon"
    restart: always
    depends_on:
      opsmanager:
        condition: service_healthy
    ports:
      - "27700-27719:27700-27719"
      - "25999:25999"
    volumes:
      - ${RELEASES}:/mongodb-mms/mongodb-releases
      - ${BACKUPD_LOGS}:/mongodb-mms/logs
      - ${OM_SNAPSHOTS}:/snapshots
      - ${OM_HEAD_DB}:/headDB
    networks:
      - opsmanager
    healthcheck:
      test: ["CMD-SHELL", "/mongodb-mms/bin/mongodb-mms-backup-daemon status | grep -q 'OK'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
networks:
  opsmanager:
    driver: bridge
