services:
  mongo:
    image: "${NAMESPACE}/mongodb:${OM_VERSION}"
    hostname: "mongo_${IDX}"
    volumes:
      - ${MONGO_DBPATH}/mongo_${IDX}:/data/db
      - ${MONGO_LOGPATH}/mongo_${IDX}:/data/log
    ports:
      - "27017"
    environment:
      OM_URL: "http://host.docker.internal:${OM_MAPPING_PORT}"
      PROJECT_ID: "${PROJECT_ID}"
      AGENT_API_KEY: "${AGENT_API_KEY}"
    restart: always
    networks:
      - mongo
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
networks:
  mongo:
    driver: bridge